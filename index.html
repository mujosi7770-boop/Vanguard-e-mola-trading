<script>
document.addEventListener("DOMContentLoaded", function () {

    let balance = 2500.00;
    const FRAIS_RETRAIT = 0.10;

    let transactions = [
        { id: 1, date: '27/03/2026', type: 'IA PROFIT', amt: 45.20, ref: 'AUTO', status: 'done' }
    ];

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.showView = showView;

    // ✅ FIX EVENT LISTENER
    const inputRet = document.getElementById('in-ret-amt');
    if (inputRet) {
        inputRet.addEventListener('input', function (e) {
            const val = parseFloat(e.target.value);
            if (val > 0) {
                const frais = val * FRAIS_RETRAIT;
                const net = val - frais;
                document.getElementById('fee-preview').innerText =
                    `Frais: ${frais.toFixed(2)} MT | Vous recevrez: ${net.toFixed(2)} MT`;
            } else {
                document.getElementById('fee-preview').innerText = "";
            }
        });
    }

    function submitAction(type) {
        const amtIn = (type === 'DEPOT') ? 'in-depo-amt' : 'in-ret-amt';
        const refIn = (type === 'DEPOT') ? 'in-depo-ref' : 'in-ret-num';

        const amt = parseFloat(document.getElementById(amtIn).value);
        const ref = document.getElementById(refIn).value;

        if (!amt || !ref) return alert("Veuillez remplir les champs.");

        if (type === 'RETRAIT') {
            if (amt > balance) return alert("❌ Solde insuffisant !");
            if (!confirm(`Confirmer ?\nNet: ${(amt * 0.9).toFixed(2)} MT`)) return;
        }

        transactions.unshift({
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            type: type,
            amt: amt,
            ref: ref,
            status: 'wait'
        });

        alert("Demande envoyée !");
        updateUI();
        showView('v-dash');
    }

    window.submitAction = submitAction;

    function accessAdmin() {
        if (prompt("Code Admin :") === "2024") showView('v-admin');
    }

    window.accessAdmin = accessAdmin;

    function process(id, state) {
        const tx = transactions.find(t => t.id === id);

        if (state === 'done') {
            tx.status = 'done';
            balance = (tx.type === 'DEPOT') ? balance + tx.amt : balance - tx.amt;
        } else {
            tx.status = 'fail';
        }

        updateUI();
    }

    window.process = process;

    function updateUI() {
        document.getElementById('display-bal').innerText =
            balance.toLocaleString('fr-FR', { minimumFractionDigits: 2 });

        document.getElementById('user-trans-list').innerHTML =
            transactions.map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.type}</td>
                    <td>${t.amt.toFixed(2)} MT</td>
                    <td><span class="status-badge s-${t.status}">${t.status}</span></td>
                </tr>
            `).join('');

        document.getElementById('admin-list').innerHTML =
            transactions.filter(t => t.status === 'wait').map(t => `
                <tr>
                    <td>${t.type}</td>
                    <td><b>${t.amt} MT</b></td>
                    <td>${t.ref}</td>
                    <td>
                        <button onclick="process(${t.id}, 'done')">OK</button>
                        <button onclick="process(${t.id}, 'fail')">X</button>
                    </td>
                </tr>
            `).join('');
    }

    // ✅ FIX CHART (sécurisé)
    if (window.ApexCharts) {
        new ApexCharts(document.querySelector("#main-chart"), {
            series: [{ name: 'Balance', data: [2100, 2300, 2200, 2400, 2500] }],
            chart: { height: 180, type: 'area', sparkline: { enabled: true } },
            colors: ['#00ff85'],
            stroke: { curve: 'smooth', width: 3 },
            fill: { type: 'gradient', gradient: { opacityFrom: 0.5, opacityTo: 0 } }
        }).render();
    }

    updateUI();
});
</script>
