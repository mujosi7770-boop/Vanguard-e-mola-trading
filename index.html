<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-10">

    <header class="p-5 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-40">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-yellow-500 tracking-tighter uppercase text-white">Smart Africa</h1>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest leading-none">Maputo • Matola</p>
            </div>
            <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-green-500 uppercase">Verificado</span>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4">
        <div class="relative my-6">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
            <input type="text" id="search" autocomplete="off"
                class="w-full pl-12 pr-4 py-4 bg-slate-800/50 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-yellow-500 outline-none transition-all placeholder:text-slate-600 text-white"
                placeholder="O que procura? (Ex: AC, Mecânico, Matola...)">
        </div>
        <div id="results" class="space-y-4"></div>
    </main>

    <div id="paymentModal" class="fixed inset-0 bg-slate-950/90 z-50 hidden items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-4 text-yellow-500">
                    <i data-lucide="shield-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold text-white">Confirmar Pedido</h2>
                <p class="text-slate-400 text-sm mt-1">Taxa de conexão: <span id="modalPrice" class="text-yellow-500 font-bold">--</span> MT</p>
            </div>
            <div class="space-y-3 mb-6 text-sm">
                <div class="flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700 text-white">
                    <span class="text-slate-400 font-bold uppercase">M-Pesa</span>
                    <span class="font-mono font-bold text-yellow-500 text-lg">85 611 3036</span>
                </div>
                <div class="flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700 text-white">
                    <span class="text-slate-400 font-bold uppercase">e-Mola</span>
                    <span class="font-mono font-bold text-orange-500 text-lg">87 321 3896</span>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <button id="btnConfirm" class="w-full bg-green-600 hover:bg-green-500 text-white font-extrabold py-4 rounded-2xl transition shadow-lg uppercase tracking-tighter">SOLICITAR AGORA</button>
                <button onclick="closeModal()" class="text-slate-500 text-sm font-bold hover:text-white transition">Voltar</button>
            </div>
        </div>
    </div>

    <script>
        const artisans = [
            // --- ❄️ FRIO ---
            {id:'F01', cat:'Frio', nome:'Refri-Maputo Lda', tel:'+258 84 235 4805', bairro:'Alto Maé', preco:75, desc:'PME especializada em AC comercial'},
            {id:'F02', cat:'Frio', nome:'Mestre Momed AC', tel:'+258 84 567 8901', bairro:'Matola T3', preco:30, desc:'Artisan local - Reparação rápida'},
            {id:'F03', cat:'Frio', nome:'Clima-Moz', tel:'+258 82 300 4567', bairro:'Polana / Sommerschield', preco:100, desc:'PME reconhecida - AVAC industrial'},
            {id:'F04', cat:'Frio', nome:'Gelo-Tech', tel:'+258 87 123 4567', bairro:'Benfica / Zimpeto', preco:50, desc:'PME - Assistência em geleiras e arcas'},
            {id:'F05', cat:'Frio', nome:'Assistência Total AC', tel:'+258 84 990 0112', bairro:'Bairro Central', preco:35, desc:'Artisan - Manutenção de split doméstico'},
            {id:'F06', cat:'Frio', nome:'Frimec SA', tel:'+258 87 600 1001', bairro:'Matola Rio', preco:250, desc:'Grande empresa - Projectos AVAC'},
            {id:'F07', cat:'Frio', nome:'DR FRIO', tel:'+258 82 450 3321', bairro:'Maputo', preco:50, desc:'PME - Recarga de gás e fugas'},
            {id:'F08', cat:'Frio', nome:'Eagle-X Lda', tel:'+258 84 600 2211', bairro:'Maputo', preco:50, desc:'PME - Assistência multimarca'},
            {id:'F19', cat:'Frio', nome:'PolarTech Lda', tel:'+258 85 777 8899', bairro:'Av. Eduardo Mondlane', preco:150, desc:'Grande empresa - Climatização central'},
            {id:'F24', cat:'Frio', nome:'Mestre Celso Frio', tel:'+258 84 333 5566', bairro:'Laulane', preco:30, desc:'Artisan local - Reparação compressores'},
            {id:'F25', cat:'Frio', nome:'Arctic Services Lda', tel:'+258 87 444 6677', bairro:'Av. Guerra Popular', preco:200, desc:'Grande empresa - AVAC industrial'},

            // --- ⚡ ELÉCTRICA ---
            {id:'E01', cat:'Elétrica', nome:'Sengelec Moçambique', tel:'+258 84 224 2424', bairro:'Maputo B.O', preco:200, desc:'Grande empresa - Média tensão et quadros'},
            {id:'E02', cat:'Elétrica', nome:'Electricidade Matola', tel:'+258 84 469 5000', bairro:'Av. Samora Machel', preco:150, desc:'Grande empresa - Assistência certificada'},
            {id:'E04', cat:'Elétrica', nome:'Electro-Serv MZ', tel:'+258 82 323 5590', bairro:'Machava', preco:50, desc:'PME - Manutenção residencial et industrial'},
            {id:'E06', cat:'Elétrica', nome:'ElectroShadd', tel:'+258 84 876 4954', bairro:'Malhampsene', preco:50, desc:'PME - Comandos et proteção elétrica'},
            {id:'E07', cat:'Elétrica', nome:'Electro-Moz-Solar', tel:'+258 84 106 9443', bairro:'Matola', preco:100, desc:'PME - Sistemas solares et inversores'},
            {id:'E11', cat:'Elétrica', nome:'Electricista João', tel:'+258 84 000 1122', bairro:'Laulane', preco:20, desc:'Artisan - Curtos et tomadas'},
            {id:'E14', cat:'Elétrica', nome:'Mestre António', tel:'+258 82 111 2233', bairro:'Bairro Central', preco:30, desc:'Artisan - Elétrica residencial 24h'},
            {id:'E15', cat:'Elétrica', nome:'Mestre Carlos Luz', tel:'+258 84 222 3344', bairro:'Matola Cidade', preco:30, desc:'Artisan - Disjuntores et fiação'},

            // --- 🚰 CANALIZADOR ---
            {id:'C01', cat:'Canalizador', nome:'Isarte Construções', tel:'+258 84 777 8899', bairro:'Maputo / Matola', preco:75, desc:'PME - Canalização, esgotos et infiltrações'},
            {id:'C03', cat:'Canalizador', nome:'Furos de Água MZ', tel:'+258 84 000 5544', bairro:'Zimpeto', preco:150, desc:'PME - Furos et bombas submersíveis'},
            {id:'C04', cat:'Canalizador', nome:'Aderegás Moçambique', tel:'+258 84 795 4014', bairro:'Rua Damião de Góis', preco:120, desc:'PME - Redes de gás et água quente'},
            {id:'C05', cat:'Canalizador', nome:'Housefix Mozambique', tel:'+258 87 460 4631', bairro:'Rua da Alegria', preco:75, desc:'PME - Reparações hidráulicas'},
            {id:'C11', cat:'Canalizador', nome:'Mestre Ricardo Picheleiro', tel:'+258 84 333 2211', bairro:'Bairro Central', preco:30, desc:'Artisan - Desentupimentos et torneiras'},

            // --- 🧹 LIMPEZA ---
            {id:'L04', cat:'Limpeza', nome:'Nemchem Moçambique', tel:'+258 85 010 2048', bairro:'Matola', preco:250, desc:'Grande empresa - Higienização industrial'},
            {id:'L05', cat:'Limpeza', nome:'Amati Limpeza', tel:'+258 87 606 0770', bairro:'Bairro Fomento', preco:60, desc:'PME - Limpeza et maintenance'},
            {id:'L11', cat:'Limpeza', nome:'Lava-Sofás Maputo', tel:'+258 82 666 7788', bairro:'Bairro Central', preco:40, desc:'Artisan - Limpeza de estofos'},
            {id:'L12', cat:'Limpeza', nome:'Dona Brilhante', tel:'+258 84 777 8899', bairro:'Matola Cidade', preco:30, desc:'Artisan - Limpeza diária'},

            // --- 📺 ELECTRÓNICA ---
            {id:'T01', cat:'Electrónica', nome:'PC Doctor MZ', tel:'+258 82 111 2233', bairro:'Maputo', preco:60, desc:'PME - Reparação de computadores'},
            {id:'T04', cat:'Electrónica', nome:'Netmoz LDA', tel:'+258 86 382 9820', bairro:'Matola', preco:75, desc:'PME - Redes informáticas et TI'},
            {id:'T08', cat:'Electrónica', nome:'The GoodGuy', tel:'+258 82 004 0000', bairro:'Av. 24 de Julho', preco:100, desc:'PME - Especialista Apple / High-End'},
            {id:'T12', cat:'Electrónica', nome:'Reparação TV Led', tel:'+258 84 777 8899', bairro:'Bairro Central', preco:35, desc:'Artisan - Ecrãs et fontes de TV'},

            // --- 🔑 SERRALHEIRO ---
            {id:'S01', cat:'Serralheiro', nome:'Chaveiro Maputo 24h', tel:'+258 82 111 2233', bairro:'Maputo', preco:150, desc:'Grande empresa - Cofres et chaves'},
            {id:'S06', cat:'Serralheiro', nome:'Locksmith Maputo', tel:'+258 85 768 5552', bairro:'Av. Maguiguana', preco:80, desc:'PME - Alta segurança'},
            {id:'S13', cat:'Serralheiro', nome:'Chaveiro Langa', tel:'+258 84 776 7129', bairro:'Rotunda de Khobe', preco:25, desc:'Artisan - Cópia et reparação'},

            // --- 🚗 MECÂNICA ---
            {id:'M01', cat:'Mecânica', nome:'Auto-Socorro 24h', tel:'+258 82 111 2233', bairro:'Av. Eduardo Mondlane', preco:200, desc:'Grande empresa - Reboque 24h'},
            {id:'M04', cat:'Mecânica', nome:'MIDAS Matola', tel:'+258 21 788 030', bairro:'Matola Cidade', preco:150, desc:'Grande empresa - Manutenção oficial'},
            {id:'M11', cat:'Mecânica', nome:'Oficina Mussa', tel:'+258 82 000 1122', bairro:'Bairro Central', preco:60, desc:'PME - Mecânica et motores'},
            {id:'M14', cat:'Mecânica', nome:'Garagem Móvel Matola', tel:'+258 82 333 4455', bairro:'Matola Gare', preco:40, desc:'Artisan - Socorro mecânico domicílio'}
        ];

        const container = document.getElementById('results');
        let currentArtisan = null;

        function render(list) {
            container.innerHTML = '';
            if(list.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-10 italic">Nenhum prestador encontrado...</p>`;
                return;
            }
            list.forEach(a => {
                container.innerHTML += `
                    <div class="bg-slate-800/40 border border-slate-700/50 p-5 rounded-2xl">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black uppercase text-yellow-500 bg-yellow-500/10 px-2 py-0.5 rounded-md mb-2 inline-block">${a.cat}</span>
                                <h3 class="text-lg font-bold text-white">${a.nome}</h3>
                                <p class="text-slate-400 text-xs mt-1 mb-2">${a.desc}</p>
                                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3 text-red-500"></i> ${a.bairro}</p>
                            </div>
                            <div class="text-right pl-2">
                                <p class="text-xl font-black text-white">${a.preco}<span class="text-[10px] ml-0.5 text-slate-500 uppercase">MT</span></p>
                            </div>
                        </div>
                        <button onclick="openModal('${a.id}')" class="w-full py-3 bg-slate-700 hover:bg-yellow-500 hover:text-black rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 uppercase tracking-tighter">
                            Solicitar Contacto <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>`;
            });
            lucide.createIcons();
        }

        function openModal(id) {
            currentArtisan = artisans.find(a => a.id === id);
            document.getElementById('modalPrice').innerText = currentArtisan.preco;
            document.getElementById('paymentModal').classList.add('modal-active');
        }

        function closeModal() { document.getElementById('paymentModal').classList.remove('modal-active'); }

        document.getElementById('btnConfirm').onclick = () => {
            const mpesaAdmin = '856113036';
            const emolaAdmin = '873213896';
            
            // ALGORITHME +1 (Cacher le numéro)
            let rawNum = currentArtisan.tel.replace(/\s/g, '').replace('+258', '');
            let secureCode = rawNum.split('').map(n => (parseInt(n) + 1) % 10).join('');
            
            // MESSAGE AUTOMATIQUE STRUCTURÉ (Rappel de paiement inclus)
            const textMsg = `*PEDIDO DE CONTACTO - SMART AFRICA*
---------------------------------------
*ID:* ${currentArtisan.id}
*PRESTADOR:* ${currentArtisan.nome}
*TAXA DE CONEXÃO:* ${currentArtisan.preco} MT
*TRACKING:* SA-${secureCode}
---------------------------------------
Olá! Gostaria de solicitar o contacto deste profissional. 

Para validar o meu pedido, vou enviar agora o valor de *${currentArtisan.preco} MT* para:
🟢 *M-Pesa:* ${mpesaAdmin}
🟠 *e-Mola:* ${emolaAdmin}

Assim que o pagamento for confirmado, por favor envie-me o contacto directo. Obrigado!`;

            window.open(`https://wa.me/258${mpesaAdmin}?text=${encodeURIComponent(textMsg)}`);
            closeModal();
        };

        // RECHERCHE OPTIMISÉE
        document.getElementById('search').oninput = (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = artisans.filter(a => 
                a.nome.toLowerCase().includes(query) || 
                a.cat.toLowerCase().includes(query) || 
                a.bairro.toLowerCase().includes(query) ||
                a.desc.toLowerCase().includes(query)
            );
            render(filtered);
        };

        render(artisans);
    </script>
</body>
</html>
